<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><title>Zara Master Monitor</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; background: #f0f2f5; }
        #list { width: 350px; background: white; border-right: 1px solid #ccc; overflow-y: auto; }
        #chat { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; position: relative; }
        .item:hover { background: #f9f9f9; }
        .active { background: #e9edef !important; }
        .unread-dot { width: 12px; height: 12px; background: #25d366; border-radius: 50%; position: absolute; right: 15px; top: 20px; }
        .tag { font-size: 10px; padding: 2px 5px; border-radius: 4px; margin-right: 5px; }
        .tag-vma { background: #dcf8c6; color: #075e54; }
        .tag-body { background: #bbdefb; color: #0d47a1; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { padding: 10px; border-radius: 8px; margin-bottom: 8px; max-width: 70%; font-size: 14px; }
        .msg.Cliente { align-self: flex-start; background: white; }
        .msg.Zara { align-self: flex-end; background: #dcf8c6; }
        .header { padding: 15px; background: #ededed; font-weight: bold; }
        .tabs { display: flex; background: #eee; padding: 5px; }
        .tab { flex: 1; text-align: center; padding: 8px; cursor: pointer; font-size: 12px; }
        .tab.active { background: white; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="list">
        <div class="header">Chats Zara</div>
        <div class="tabs">
            <div class="tab active" onclick="setF('all')">Todos</div>
            <div class="tab" onclick="setF('vma')">VMA (Ventas)</div>
            <div class="tab" onclick="setF('body')">Body Elite</div>
        </div>
        <div id="chat-items"></div>
    </div>
    <div id="chat">
        <div id="chat-head" class="header">Selecciona un chat</div>
        <div id="msgs"></div>
    </div>
    <script>
        let chats = {}; let filter = 'all'; let selId = null;
        async function load() {
            const r = await fetch('/api/history');
            chats = await r.json();
            renderList();
            if(selId) renderMsgs(selId);
        }
        function renderList() {
            const container = document.getElementById('chat-items');
            container.innerHTML = '';
            Object.keys(chats).sort((a,b)=>chats[b].lastTs - chats[a].lastTs).forEach(id => {
                const c = chats[id];
                if(filter === 'vma' && !c.tags.includes('VENTA_VMA')) return;
                if(filter === 'body' && !c.tags.includes('CITA_BODY')) return;
                const div = document.createElement('div');
                div.className = `item ${selId === id ? 'active' : ''}`;
                div.onclick = () => { selId = id; renderMsgs(id); load(); };
                div.innerHTML = `
                    <strong>${c.nombre}</strong><br><small>${id}</small>
                    ${c.unread > 0 ? '<div class="unread-dot"></div>' : ''}
                    <div style="margin-top:5px">
                        ${c.tags.map(t=> `<span class="tag ${t==='VENTA_VMA'?'tag-vma':'tag-body'}">${t}</span>`).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }
        function renderMsgs(id) {
            const c = chats[id];
            document.getElementById('chat-head').innerText = c.nombre + " (+" + id + ")";
            const mDiv = document.getElementById('msgs');
            mDiv.innerHTML = c.mensajes.map(m => `
                <div class="msg ${m.from}">
                    ${m.texto}<br><small style="color:#999;font-size:9px">${m.hora}</small>
                </div>
            `).join('');
            mDiv.scrollTop = mDiv.scrollHeight;
        }
        function setF(f) { filter = f; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); event.target.classList.add('active'); renderList(); }
        setInterval(load, 3000); load();
    </script>
</body>
</html>
