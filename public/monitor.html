<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Zara</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #e5ddd5; height: 100vh; display: flex; overflow: hidden; }
        
        /* SIDEBAR ESTILO CRM */
        #sidebar { width: 400px; background: white; display: flex; flex-direction: column; border-right: 1px solid #ccc; }
        
        .crm-header { background: #075e54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .crm-tabs { display: flex; background: #f0f2f5; border-bottom: 1px solid #ddd; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 13px; font-weight: bold; color: #54656f; border-bottom: 3px solid transparent; }
        .tab.active { color: #00a884; border-bottom: 3px solid #00a884; background: white; }
        .tab:hover { background: #e9edef; }

        .toolbar { padding: 10px; background: #f0f2f5; display: flex; gap: 10px; border-bottom: 1px solid #ddd; align-items: center; }
        .btn-bulk { background: #d32f2f; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; display: none; }
        
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px; border-bottom: 1px solid #f0f2f5; cursor: pointer; align-items: center; position: relative; }
        .chat-item:hover { background: #f5f6f6; }
        .chat-item.active { background: #e9edef; }
        
        .avatar { width: 45px; height: 45px; background: #dfe3e5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; margin-right: 10px; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: bold; color: #111b21; font-size: 16px; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .chat-last-msg { color: #667781; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-check { margin-right: 10px; transform: scale(1.2); cursor: pointer; }

        /* TAGS / ESTADOS */
        .badges { display: flex; gap: 5px; margin-top: 5px; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: white; }
        .badge-vma { background: #00a884; } /* Verde WhatsApp */
        .badge-body { background: #9c27b0; } /* Morado Estética */
        .badge-new { background: #2196f3; } /* Azul Nuevo */

        /* MAIN CHAT */
        #main { flex: 1; display: flex; flex-direction: column; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        #chat-header { background: #f0f2f5; padding: 10px 20px; border-left: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .wa-btn { background: #25d366; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; display: flex; gap: 5px; align-items: center; }
        
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 65%; padding: 8px 12px; border-radius: 7.5px; font-size: 14px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); }
        .msg.cliente { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .msg.zara { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .time { font-size: 10px; color: #667781; float: right; margin-left: 10px; margin-top: 3px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="crm-header">
        <span><i class="fas fa-robot"></i> CRM Zara</span>
        <small id="last-update" style="opacity:0.8">Actualizado</small>
    </div>
    
    <div class="crm-tabs">
        <div class="tab active" onclick="setFilter('all')">TODOS</div>
        <div class="tab" onclick="setFilter('vma')">VMA 👕</div>
        <div class="tab" onclick="setFilter('body')">BODY 💆‍♀️</div>
    </div>

    <div class="toolbar">
        <input type="checkbox" onchange="toggleSelectAll(this)" title="Seleccionar todos">
        <span style="font-size:12px; color:#666;">Selección</span>
        <button id="btn-delete" class="btn-bulk" onclick="deleteSelected()"><i class="fas fa-trash"></i> BORRAR (<span id="count-sel">0</span>)</button>
    </div>

    <div id="chat-list"></div>
</div>

<div id="main">
    <div id="empty-view" style="display:flex; justify-content:center; align-items:center; height:100%; color:#54656f; background:#f0f2f5;">
        <div><i class="fas fa-comments" style="font-size:40px; margin-bottom:10px;"></i><br>Selecciona un chat</div>
    </div>
    <div id="chat-view" style="display:none; height:100%; flex-direction:column;">
        <div id="chat-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div class="avatar" style="background:#00a884;"><i class="fas fa-user"></i></div>
                <div>
                    <h3 id="h-name" style="margin:0; font-size:16px;">Nombre</h3>
                    <span id="h-phone" style="font-size:12px; color:#54656f;">+569...</span>
                </div>
            </div>
            <a href="#" id="wa-link" target="_blank" class="wa-btn"><i class="fab fa-whatsapp"></i> Abrir Chat</a>
        </div>
        <div id="messages"></div>
    </div>
</div>

<script>
    let allChats = {};
    let currentFilter = 'all';
    let selectedIds = new Set();
    let currentChatId = null;

    async function loadData() {
        try {
            const res = await fetch('/api/history', { headers: { 'Authorization': 'Basic ' + btoa('admin:123456') } });
            if(res.status===401) return;
            allChats = await res.json();
            renderList();
            if(currentChatId && allChats[currentChatId]) renderMessages(currentChatId);
            document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
        } catch(e) {}
    }

    function setFilter(type) {
        currentFilter = type;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        renderList();
    }

    function toggleSelect(id) {
        if(selectedIds.has(id)) selectedIds.delete(id);
        else selectedIds.add(id);
        updateBulkUI();
    }

    function toggleSelectAll(source) {
        const visibleIds = getFilteredIds();
        if(source.checked) visibleIds.forEach(id => selectedIds.add(id));
        else selectedIds.clear();
        renderList(); // Re-render checks
        updateBulkUI();
    }

    function updateBulkUI() {
        const btn = document.getElementById('btn-delete');
        const count = document.getElementById('count-sel');
        if(selectedIds.size > 0) {
            btn.style.display = 'block';
            count.innerText = selectedIds.size;
        } else {
            btn.style.display = 'none';
        }
    }

    async function deleteSelected() {
        if(!confirm(`¿Borrar ${selectedIds.size} chats seleccionados?`)) return;
        await fetch('/api/delete-bulk', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Basic ' + btoa('admin:123456') 
            },
            body: JSON.stringify({ ids: Array.from(selectedIds) })
        });
        selectedIds.clear();
        loadData();
    }

    function getFilteredIds() {
        return Object.keys(allChats).filter(id => {
            const chat = allChats[id];
            const tags = chat.tags || [];
            if(currentFilter === 'all') return true;
            if(currentFilter === 'vma') return tags.some(t => t.includes('VMA'));
            if(currentFilter === 'body') return tags.some(t => t.includes('BODY'));
            return false;
        }).sort((a,b) => allChats[b].lastTs - allChats[a].lastTs);
    }

    function renderList() {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';
        const ids = getFilteredIds();

        ids.forEach(id => {
            const chat = allChats[id];
            const lastMsg = chat.mensajes[chat.mensajes.length-1] || {};
            const isSel = selectedIds.has(id);
            
            // Generar Badges
            let badgesHtml = '';
            if(chat.tags) {
                if(chat.tags.includes('VMA_VENTA')) badgesHtml += '<span class="badge badge-vma">VENTA</span>';
                if(chat.tags.includes('BODY_CITA')) badgesHtml += '<span class="badge badge-body">CITA</span>';
                if(chat.tags.includes('BODY_INTERES')) badgesHtml += '<span class="badge badge-body">INTERÉS</span>';
            }

            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === id ? 'active' : ''}`;
            div.innerHTML = `
                <input type="checkbox" class="chat-check" onclick="event.stopPropagation(); toggleSelect('${id}')" ${isSel ? 'checked' : ''}>
                <div class="avatar" style="background:${stringToColor(chat.nombre)}">${chat.nombre.charAt(0)}</div>
                <div class="chat-info" onclick="selectChat('${id}')">
                    <div class="chat-name">${chat.nombre} <span style="font-size:11px;color:#999;">${new Date(chat.lastTs).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div>
                    <div class="chat-last-msg">${lastMsg.from==='Zara'?'🤖':'👤'} ${lastMsg.texto || ''}</div>
                    <div class="badges">${badgesHtml}</div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function selectChat(id) {
        currentChatId = id;
        document.getElementById('empty-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'flex';
        renderMessages(id);
        renderList();
    }

    function renderMessages(id) {
        const chat = allChats[id];
        document.getElementById('h-name').innerText = chat.nombre;
        document.getElementById('h-phone').innerText = `+${id}`;
        document.getElementById('wa-link').href = `https://wa.me/${id}`; // EL FIX DEL NÚMERO FUNCIONA AQUÍ
        
        const div = document.getElementById('messages');
        div.innerHTML = '';
        chat.mensajes.forEach(m => {
            const el = document.createElement('div');
            el.className = `msg ${m.from==='Zara'?'zara':'cliente'}`;
            el.innerHTML = `${m.texto}<div class="time">${m.hora}</div>`;
            div.appendChild(el);
        });
        div.scrollTop = div.scrollHeight;
    }

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        const c = (hash & 0x00FFFFFF).toString(16).toUpperCase();
        return '#' + "00000".substring(0, 6 - c.length) + c;
    }

    setInterval(loadData, 3000);
    loadData();
</script>
</body>
</html>
