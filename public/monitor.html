<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CRM Zara v2.0 | Control Total</title>
    <style>
        :root { --whatsapp-green: #25d366; --whatsapp-teal: #128c7e; --bg-gray: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-gray); color: #444; }
        
        /* Sidebar Estilo WhatsApp */
        #sidebar { width: 400px; background: var(--white); border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #f6f6f6; border-bottom: 1px solid #ddd; }
        .sidebar-header h2 { margin: 0; font-size: 20px; color: var(--whatsapp-teal); }
        
        .tabs { display: flex; padding: 10px; background: #fff; gap: 10px; border-bottom: 1px solid #eee; }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; border-radius: 20px; font-size: 13px; font-weight: 600; background: #f0f0f0; transition: 0.3s; }
        .tab.active { background: var(--whatsapp-green); color: white; }

        #search-bar { padding: 10px 20px; }
        #search-bar input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }

        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #f2f2f2; cursor: pointer; display: flex; justify-content: space-between; position: relative; transition: 0.2s; }
        .chat-item:hover { background: #f5f5f5; }
        .chat-item.active { background: #ebebeb; }
        
        .chat-main-info { flex: 1; }
        .chat-name { font-weight: 600; font-size: 15px; color: #111; display: block; }
        .chat-preview { font-size: 13px; color: #666; display: block; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }
        
        .unread-badge { background: var(--whatsapp-green); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; margin-top: 5px; }
        .chat-meta { text-align: right; }
        .chat-time { font-size: 11px; color: #999; }

        .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 5px; display: inline-block; }
        .tag-vma { background: #dcf8c6; color: #075e54; }
        .tag-body { background: #e1f5fe; color: #0277bd; }

        /* Área de Chat */
        #chat-view { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        #chat-view::before { content: ""; position: absolute; width: 100%; height: 100%; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.06; pointer-events: none; }
        
        #view-header { background: #ededed; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #ddd; z-index: 10; }
        #view-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }

        .bubble { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 14.5px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); line-height: 1.4; }
        .bubble.Cliente { align-self: flex-start; background: var(--white); border-top-left-radius: 0; }
        .bubble.Zara { align-self: flex-end; background: #dcf8c6; border-top-right-radius: 0; }
        .bubble-time { font-size: 10px; color: #999; display: block; text-align: right; margin-top: 4px; }

        .status-bar { padding: 5px 15px; font-size: 12px; background: #fff3cd; color: #856404; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2>Zara CRM 3.0</h2>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="setF('all', this)">Todos</div>
        <div class="tab" onclick="setF('VENTA_VMA', this)">VMA 👕</div>
        <div class="tab" onclick="setF('CITA_BODY', this)">Body 🧖‍♀️</div>
    </div>
    <div id="search-bar">
        <input type="text" id="busqueda" placeholder="Buscar por nombre o número..." oninput="renderList()">
    </div>
    <div id="chat-list"></div>
</div>

<div id="chat-view">
    <div id="view-header">Selecciona una conversación</div>
    <div id="view-messages"></div>
</div>

<script>
    let currentId = null;
    let filter = 'all';
    let data = {};

    async function fetchData() {
        const r = await fetch('/api/history');
        data = await r.json();
        renderList();
        if(currentId) renderChat(currentId);
    }

    function renderList() {
        const list = document.getElementById('chat-list');
        const query = document.getElementById('busqueda').value.toLowerCase();
        list.innerHTML = '';

        Object.keys(data).sort((a,b) => data[b].lastTs - data[a].lastTs).forEach(id => {
            const chat = data[id];
            if(filter !== 'all' && !chat.tags.includes(filter)) return;
            if(query && !chat.nombre.toLowerCase().includes(query) && !id.includes(query)) return;

            const div = document.createElement('div');
            div.className = `chat-item ${currentId === id ? 'active' : ''}`;
            div.onclick = () => { currentId = id; renderChat(id); renderList(); };
            
            const last = chat.mensajes[chat.mensajes.length - 1];
            const tagsHtml = chat.tags.map(t => `<span class="tag ${t.includes('VMA')?'tag-vma':'tag-body'}">${t.replace('_',' ')}</span>`).join('');

            div.innerHTML = `
                <div class="chat-main-info">
                    <span class="chat-name">${chat.nombre}</span>
                    <span class="chat-preview">${last ? last.texto : ''}</span>
                    ${tagsHtml}
                </div>
                <div class="chat-meta">
                    <span class="chat-time">${last ? last.hora : ''}</span>
                    ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
                </div>
            `;
            list.appendChild(div);
        });
    }

    function renderChat(id) {
        currentId = id;
        const chat = data[id];
        document.getElementById('view-header').innerHTML = `<strong>${chat.nombre}</strong> <small>(+${id})</small>`;
        const msgs = document.getElementById('view-messages');
        msgs.innerHTML = chat.mensajes.map(m => `
            <div class="bubble ${m.from}">
                ${m.texto}
                <span class="bubble-time">${m.hora}</span>
            </div>
        `).join('');
        msgs.scrollTop = msgs.scrollHeight;
    }

    function setF(f, el) {
        filter = f;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderList();
    }

    setInterval(fetchData, 4000);
    fetchData();
</script>
</body>
</html>
